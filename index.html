<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VONA POS</title>

  <!-- Letakkan script Supabase di sini (di dalam head) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div id="root">
    <div id="splash-screen" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #2563eb; /* Biru VONA */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    ">
      <img src="public/logo1.png" alt="VONA POS"/>
      <p
        style="color: rgba(255,255,255,0.6); font-family: sans-serif; font-size: 10px; margin-top: 10px; font-weight: bold; letter-spacing: 2px;">
        ORIXA DEV
      </p>
    </div>
  </div>

  <style>
    /* Tampilan logo dekstop */
    #splash-screen img {
      height: 80px;
      margin-bottom: 10px;
      animation: pulse 2s infinite;
    }

    #splash-screen p {
      font-size: 12px;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.05);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 0.8;
      }
    }

    /* Tampilan ukuran logo di HP */
    @media (max-width: 600px) {
      #splash-screen img {
        height: 40px;
        margin-bottom: auto;
      }

      #splash-screen p {
        font-size: 8px;
      }
    }
  </style>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
